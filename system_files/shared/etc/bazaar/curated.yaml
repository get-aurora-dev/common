rows:
  - banner:
      height: 250
      image:
        light-uri: https://getaurora.dev/aurora-text-logo.svg
        dark-uri: https://getaurora.dev/aurora-trans.svg
        fit: contain # contain, fill, cover or scale-down
        alt: "Aurora Logo"
        can-shrink: true
        halign: center
      dark-color: "#030712"
      light-color: "#c8c8c8"

  - section:
      title: "Welcome to Bazaar"
      subtitle:
        string: |
          [Contribute to this page](https://github.com/get-aurora-dev/common/blob/main/system_files/shared/etc/bazaar/curated.yaml)

      overflow-count: 4 # Will automatically create a "Show More" button, if there are more apps than the count (except if enable-bulk-install is true)
      list-type: rich # Directly features an install button on the card, use when a section has little apps.
      appids:
        list:
          - io.github.vani_tty1.memerist
          - re.sonny.Eloquent
          - io.github.halfmexican.Mingle
          - org.kde.audiotube
          - io.github.pleromix.IceBox
          - io.github.nozwock.Packet
          - com.github.ADBeveridge.Raider
          - rocks.shy.VacuumTube
          - com.github.PintaProject.Pinta
  - section:
      title: "Aurora & KDE News"

  - articles:
      # uri: https://usebazaar.org/curated/articles.yaml # Can be used as a feed.
      list: # Used only if URI fails, or is not given.
        - title: "Stargazer 6-7" # Also used as the title on the article page
          subtitle: "Aurora Happenings in the first half of 2026"
          image: https://i.imgur.com/VMFWNaF.png # Always in 16:9
          uri: https://raw.githubusercontent.com/ublue-os/aurora-docs/refs/heads/main/blog/2026-06-18-plasma-6-7-aurora-june.md
        - title: "KDE 6.7 release"
          image: https://kde.org/stuff/clipart/logo/kde-logo-white-blue-3000x3000.png
          uri: https://invent.kde.org/websites/blogs-kde-org/-/raw/master/content/posts/twip/2026-06-20/index.md?ref_type=heads

  - section:
      title: "Apps of the Month"
  - featured-carousel: # A carousel, like the one seen at the top of the "Explore" page
      # disable-auto-rotate: true
      appids:
        list:
          - org.kde.drawy
          - de.wwwtech.gitte

