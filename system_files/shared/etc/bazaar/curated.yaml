# https://github.com/bazaar-org/bazaar/blob/main/docs/example.yaml
# Don't put apps without branding colors into a "featured-carousel" it looks bad
# on list: sections of 12 apps look nice at all window widths
rows:
  - banner:
      height: 250
      image:
        light-uri: https://getaurora.dev/aurora-text-logo.svg
        dark-uri: https://getaurora.dev/aurora-trans.svg
        fit: contain # contain, fill, cover or scale-down
        alt: "Aurora Logo"
        can-shrink: true
        halign: center
      dark-color: "#030712"
      light-color: "#c8c8c8"

  - section:
      title: "Blog posts"
      subtitle:
        string: |
          Here we will share news related to Aurora and cool other projects

  - articles:
      list:
        - title: "Stargazer 6-7"
          subtitle: "Aurora Happenings in the first half of 2026"
          image: https://kde.org/announcements/plasma/6/6.7.0/blur_light_1920x1080.png
          uri: https://raw.githubusercontent.com/ublue-os/aurora-docs/refs/heads/main/blog/2026-06-18-plasma-6-7-aurora-june.md

        - title: "Retiring stable-daily stream"
          subtitle: "Aurora Happenings in the first half of 2026"
          image: 
          uri: https://raw.githubusercontent.com/ublue-os/aurora-docs/refs/heads/main/blog/2026-06-18-plasma-6-7-aurora-june.md


